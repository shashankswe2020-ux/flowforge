name: Nightly Deep-Agent Demo

# T13 — runs the canonical FlowForge demo prompt against a mocked LLM
# nightly, and gates releases on:
#   1. the e2e demo finishes with run_status ∈ {succeeded, blocked};
#   2. no test-count regression vs the committed baseline;
#   3. the full unit/integration suite still passes with
#      OPENAI_API_KEY=invalid (spec §13.12 — no real LLM calls).

on:
  schedule:
    # 07:30 UTC every day — keeps signal fresh without thrashing CI.
    - cron: "30 7 * * *"
  workflow_dispatch: {}
  pull_request:
    paths:
      - "tests/e2e/**"
      - ".github/workflows/nightly-deep-agent.yml"
      - ".github/test-count-baseline"

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"
  # Setting an obviously-invalid key makes any accidental real LLM
  # call fail loudly with a 401 instead of silently succeeding.
  OPENAI_API_KEY: invalid

jobs:
  demo:
    name: E2E demo + no-real-LLM smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Run the demo with both flag positions to keep deep-agent and
        # legacy paths in lockstep.
        deep_agents: ["0", "1"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -r requirements-dev.txt

      - name: E2E demo (FLOWFORGE_DEEP_AGENTS=${{ matrix.deep_agents }})
        env:
          FLOWFORGE_DEEP_AGENTS: ${{ matrix.deep_agents }}
        run: python -m pytest tests/e2e -q

      - name: Test-count regression guard
        run: |
          set -euo pipefail
          BASELINE_FILE=".github/test-count-baseline"
          if [[ ! -f "$BASELINE_FILE" ]]; then
            echo "::error::Missing $BASELINE_FILE — refusing to run unguarded."
            exit 1
          fi
          BASELINE="$(cat "$BASELINE_FILE")"
          COLLECTED="$(python -m pytest --collect-only -q 2>/dev/null \
            | tail -1 | grep -oE '[0-9]+' | head -1)"
          echo "baseline=$BASELINE collected=$COLLECTED"
          if [[ -z "$COLLECTED" ]] || (( COLLECTED < BASELINE )); then
            echo "::error::Test-count regression: $COLLECTED < $BASELINE"
            exit 1
          fi

      - name: Full suite with OPENAI_API_KEY=invalid (spec §13.12)
        # OPENAI_API_KEY is already set to "invalid" via the workflow
        # env block above — repeated here as a reminder of intent.
        env:
          OPENAI_API_KEY: invalid
        run: python -m pytest -q
